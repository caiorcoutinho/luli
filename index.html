<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fofuchinha</title>
  <style>
    /* ── TEMAS OTIMIZADOS ── */
    :root, [data-theme="light"] {
      --bg: #ffffff;
      --title: #b03060;
      --sub: #999;
      --ctrl-label: #aaa;
      --ctrl-val: #555;
      --btn-border: #e0a0b0;
      --btn-color: #c0305a;
      --btn-hover-bg: #c0305a;
      --btn-hover-fg: #fff;
      --hint: #ccc;
      --divider: #e0a0b0;
      --eyebrow: #cca0b0;
      --timer-num: #c0305a;
      --timer-shadow: rgba(192,48,90,0.18);
      --timer-label: #d4a0b5;
      --timer-since: #c8a0b0;
      --timer-strong: #b03060;
      --separator: #f0c0d0;
      --toggle-bg: #f5e6eb;
      --toggle-icon: #b03060;
      --heart-font: 'Playfair Display', serif;
      --heart-color: #c0182a;
      --heart-glow-color: rgba(192,24,42,0.65);
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --title: #ff6090;
      --sub: #664455;
      --ctrl-label: #664455;
      --ctrl-val: #cc7090;
      --btn-border: #6a2840;
      --btn-color: #ff6090;
      --btn-hover-bg: #c0305a;
      --btn-hover-fg: #fff;
      --hint: #3d2030;
      --divider: #6a2840;
      --eyebrow: #7a3050;
      --timer-num: #ff6090;
      --timer-shadow: rgba(255,80,130,0.35);
      --timer-label: #7a4060;
      --timer-since: #6a3050;
      --timer-strong: #ff6090;
      --separator: #4a1830;
      --toggle-bg: #1e0e18;
      --toggle-icon: #ff6090;
      --heart-font: Georgia, serif;
      --heart-color: #ff6090;
      --heart-glow-color: rgba(255,80,144,0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); transition: background 0.3s ease; will-change: background; }

    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--btn-border);
      background: var(--toggle-bg);
      color: var(--toggle-icon);
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    #theme-toggle:hover { transform: scale(1.05); }

    #luiza-heart-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1rem 3rem;
      background: var(--bg);
      transition: background 0.3s ease;
    }

    #luiza-heart-section h2 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--title);
      margin-bottom: 0.3rem;
    }

    #luiza-heart-section p.sub {
      font-size: 0.8rem;
      color: var(--sub);
      margin-bottom: 1rem;
    }

    #luiza-canvas {
      display: block;
      width: 100%;
      max-width: 480px;
      height: auto;
      cursor: grab;
      touch-action: none;
      will-change: transform;
    }
    #luiza-canvas:active { cursor: grabbing; }

    .lh-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lh-controls label {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ctrl-label);
    }

    .lh-controls input[type=range] {
      width: 80px;
      accent-color: #c0305a;
    }

    .lh-controls span {
      font-size: 11px;
      font-weight: 600;
      color: var(--ctrl-val);
      min-width: 24px;
    }

    .lh-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--btn-border);
      background: transparent;
      color: var(--btn-color);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .lh-btn:hover {
      background: var(--btn-hover-bg);
      color: var(--btn-hover-fg);
    }

    .lh-hint {
      font-size: 10px;
      color: var(--hint);
      margin-top: 0.6rem;
    }

    #love-timer-section {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 3rem;
      transition: background 0.3s ease;
    }

    .timer-divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--divider), transparent);
      margin-bottom: 2rem;
    }

    .timer-title {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--title);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .timer-grid {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .timer-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0.8rem;
      position: relative;
    }

    .timer-cell:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0.3rem;
      height: 2.2rem;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--separator), transparent);
    }

    .timer-number {
      font-family: 'Courier New', monospace;
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--timer-num);
      line-height: 1;
      text-shadow: 0 0 20px var(--timer-shadow);
    }

    .timer-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--timer-label);
      margin-top: 0.4rem;
    }

    .timer-since {
      font-size: 0.9rem;
      color: var(--timer-since);
    }
    .timer-since strong {
      color: var(--timer-strong);
      font-weight: 600;
    }

    .timer-heart {
      display: inline-block;
      color: var(--timer-num);
      font-size: 0.9rem;
      margin: 0 0.2rem;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.2); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      56% { transform: scale(1); }
    }

    @media (max-width: 420px) {
      .timer-grid { gap: 0.5rem; }
      .timer-cell { padding: 0 0.4rem; }
      .timer-label { font-size: 0.45rem; letter-spacing: 0.15em; }
    }
  </style>
</head>
<body>

<button id="theme-toggle" aria-label="Alternar tema">🌙</button>

<section id="luiza-heart-section">
  <h2>Caio ❤ Luli</h2>
  <p class="sub">arraste para girar</p>
  <canvas id="luiza-canvas" width="480" height="420"></canvas>
  <p class="lh-hint">segure e arraste para girar o coração</p>
</section>

<section id="love-timer-section">
  <div class="timer-divider"></div>
  <p class="timer-title">desde <strong>27 de janeiro de 2026</strong></p>
  <div class="timer-grid">
    <div class="timer-cell"><span class="timer-number" id="t-days">00</span><span class="timer-label">dias</span></div>
    <div class="timer-cell"><span class="timer-number" id="t-hours">00</span><span class="timer-label">horas</span></div>
    <div class="timer-cell"><span class="timer-number" id="t-mins">00</span><span class="timer-label">minutos</span></div>
    <div class="timer-cell"><span class="timer-number" id="t-secs">00</span><span class="timer-label">segundos</span></div>
  </div>
  <p class="timer-title"><strong>Vivendo de amor</strong> <span class="timer-heart">♥</span></p>
</section>

<script>
(function() {
  // Tema simplificado
  const html = document.documentElement;
  const toggle = document.getElementById('theme-toggle');
  let isDark = true;

  toggle.addEventListener('click', () => {
    isDark = !isDark;
    html.setAttribute('data-theme', isDark ? 'dark' : 'light');
    toggle.textContent = isDark ? '🌙' : '☀️';
  });

  // Configuração otimizada do coração
  const canvas = document.getElementById('luiza-canvas');
  const ctx = canvas.getContext('2d');

  // Dimensões otimizadas
  const W = 480, H = 420;
  canvas.width = W;
  canvas.height = H;

  let rotY = 0, rotX = 0.18;
  let dragging = false, lastX = 0, lastY = 0;
  let autoRotate = true;
  let t = 0;

  const word = 'Luiza';
  const POINTS_COUNT = 240; // Reduzido de 540 para 120 pontos

  // Funções do coração otimizadas
  const heartX = a => 16 * Math.pow(Math.sin(a), 3);
  const heartY = a => -(13 * Math.cos(a) - 5 * Math.cos(2 * a) - 2 * Math.cos(3 * a) - Math.cos(4 * a));

  // Gerar pontos 3D com menos pontos
  const pts3d = [];
  const layers = 4; // Reduzido de 3 para 4 (equivalente a 180 pontos)
  const pointsPerLayer = POINTS_COUNT / layers;

  for (let vi = 0; vi < layers; vi++) {
    const depth = vi / (layers - 1);
    const layerScale = 1 - depth * 0.2;
    const zOffset = (depth - 0.5) * 5;

    for (let ui = 0; ui < pointsPerLayer; ui++) {
      const ang = (ui / pointsPerLayer) * Math.PI * 2;
      pts3d.push({
        x: heartX(ang) * layerScale,
        y: heartY(ang) * layerScale,
        z: zOffset + Math.sin(ang * 1.5) * (1 - depth) * 0.8,
        phase: ang,
        idx: ui,
        depth: depth
      });
    }
  }

  // Projeção otimizada (sem criação de objetos desnecessários)
  const fov = 280;
  const scaleFactor = 12;
  const centerX = W / 2;
  const centerY = H / 2;

  function projectPoint(p) {
    const cosY = Math.cos(rotY);
    const sinY = Math.sin(rotY);
    const cosX = Math.cos(rotX);
    const sinX = Math.sin(rotX);

    const x1 = p.x * cosY - p.z * sinY;
    const z1 = p.x * sinY + p.z * cosY;
    const y2 = p.y * cosX - z1 * sinX;
    const z2 = p.y * sinX + z1 * cosX;

    const pz = fov + z2;
    const invPz = 1 / pz;
    return {
      px: centerX + (x1 * fov * scaleFactor * invPz),
      py: centerY + (y2 * fov * scaleFactor * invPz),
      pz: z2,
      scale: fov * invPz
    };
  }

  // Cache de estilos para evitar recálculos
  let cachedVars = null;
  let lastThemeCheck = 0;

  function getHeartVars() {
    const now = Date.now();
    if (!cachedVars || now - lastThemeCheck > 100) {
      const s = getComputedStyle(html);
      cachedVars = {
        font: s.getPropertyValue('--heart-font').trim() || 'Georgia, serif',
        color: s.getPropertyValue('--heart-color').trim() || '#c0182a',
        glowColor: s.getPropertyValue('--heart-glow-color').trim() || 'rgba(192,24,42,0.65)'
      };
      lastThemeCheck = now;
    }
    return cachedVars;
  }

  // Animação principal otimizada
  let frameRequest;
  let lastTimestamp = 0;

  function animate() {
    const vars = getHeartVars();
    const pulse = 1 + 0.04 * Math.sin(t * 2);

    // Coletar e projetar pontos
    const projected = [];
    const marchOffset = Math.floor(t * 15) % word.length;

    for (let i = 0; i < pts3d.length; i++) {
      const p = pts3d[i];
      const pr = projectPoint({
        x: p.x * pulse,
        y: p.y * pulse,
        z: p.z * pulse
      });

      const zNorm = (pr.pz + 6) / 12;
      const wave = Math.sin(t * 8 + p.phase);
      const alpha = Math.min(0.4 + 0.5 * zNorm * (0.7 + 0.3 * wave), 0.95);
      const size = Math.max(6 + 3 * wave, 5) * pr.scale;

      const charIdx = (i + marchOffset) % word.length;

      projected.push({
        px: pr.px,
        py: pr.py,
        z: pr.pz,
        alpha: alpha,
        size: size,
        char: word[charIdx]
      });
    }

    // Ordenação simplificada (quicksort manual para performance)
    projected.sort((a, b) => a.z - b.z);

    // Renderização com batch
    ctx.clearRect(0, 0, W, H);

    // Batch rendering para reduzir chamadas
    for (let i = 0; i < projected.length; i++) {
      const p = projected[i];
      if (p.px > -50 && p.px < W + 50 && p.py > -50 && p.py < H + 50) {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.font = `600 ${Math.max(5, Math.min(24, p.size))}px ${vars.font}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = vars.color;
        ctx.shadowColor = vars.glowColor;
        ctx.shadowBlur = 8 + 4 * ((p.z + 5) / 10);
        ctx.fillText(p.char, p.px, p.py);
        ctx.restore();
      }
    }

    if (!dragging && autoRotate) {
      rotY += 0.006;
    }

    t += 0.016;
    frameRequest = requestAnimationFrame(animate);
  }

  // Controles de arrasto otimizados
  function startDrag(e) {
    dragging = true;
    autoRotate = false;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    lastX = clientX;
    lastY = clientY;
    e.preventDefault();
  }

  function onDrag(e) {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    rotY += (clientX - lastX) * 0.008;
    rotX = Math.max(-0.8, Math.min(0.8, rotX + (clientY - lastY) * 0.007));
    lastX = clientX;
    lastY = clientY;
    e.preventDefault();
  }

  function endDrag() {
    dragging = false;
  }

  canvas.addEventListener('mousedown', startDrag);
  window.addEventListener('mousemove', onDrag);
  window.addEventListener('mouseup', endDrag);
  canvas.addEventListener('touchstart', startDrag, { passive: false });
  window.addEventListener('touchmove', onDrag, { passive: false });
  window.addEventListener('touchend', endDrag);

  // Cronômetro otimizado
  const START_DATE = new Date(2026, 0, 27); // Mês 0 = Janeiro
  const elDays = document.getElementById('t-days');
  const elHours = document.getElementById('t-hours');
  const elMins = document.getElementById('t-mins');
  const elSecs = document.getElementById('t-secs');

  function updateTimer() {
    const now = new Date();
    const diff = Math.max(0, now - START_DATE);
    const totalSecs = Math.floor(diff / 1000);

    const days = Math.floor(totalSecs / 86400);
    const hours = Math.floor((totalSecs % 86400) / 3600);
    const mins = Math.floor((totalSecs % 3600) / 60);
    const secs = totalSecs % 60;

    elDays.textContent = days < 100 ? String(days).padStart(2, '0') : String(days);
    elHours.textContent = String(hours).padStart(2, '0');
    elMins.textContent = String(mins).padStart(2, '0');
    elSecs.textContent = String(secs).padStart(2, '0');

    // Efeito sutil nos segundos
    elSecs.style.transform = 'scale(1.02)';
    setTimeout(() => { elSecs.style.transform = ''; }, 100);
  }

  updateTimer();
  setInterval(updateTimer, 1000);

  // Iniciar animação
  animate();

  // Limpeza em caso de descarregamento da página
  window.addEventListener('beforeunload', () => {
    if (frameRequest) cancelAnimationFrame(frameRequest);
  });
})();
</script>
</body>
</html>
